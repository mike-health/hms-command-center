<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Map — HMS Command</title>
<link rel="stylesheet" href="/css/app.css">
<style>
.map-grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; height: 100%; }
.map-sidebar { display: flex; flex-direction: column; gap: 10px; }
.map-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.map-card:hover { border-color: #bfdbfe; }
.map-card.active { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
.map-card-name { font-size: 13px; font-weight: 600; color: #1e293b; }
.map-card-city { font-size: 11px; color: #64748b; margin-top: 2px; }
.map-card-badges { display: flex; gap: 4px; margin-top: 6px; }
.map-main {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 500px;
}
.map-placeholder {
  text-align: center;
  color: #94a3b8;
  padding: 40px;
}
.map-placeholder .big-icon { font-size: 48px; margin-bottom: 12px; }
.clinic-detail-panel {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 16px;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><h1>HMS Command</h1><div class="sub">Hyperbaric Management</div></div>
    <nav class="nav">
      <div class="nav-section">
        <div class="nav-section-title">Overview</div>
        <a href="/" class="nav-item" data-page="dashboard"><span class="nav-icon">◈</span><span>Dashboard</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Operations</div>
        <a href="/modules/org-chart.html" class="nav-item" data-page="org-chart"><span class="nav-icon">⚙</span><span>Org Chart</span></a>
        <a href="/modules/map.html" class="nav-item active" data-page="map"><span class="nav-icon">◎</span><span>Clinic Map</span><span class="nav-badge blue" id="map-badge">6</span></a>
        <a href="/modules/referrals.html" class="nav-item" data-page="referrals"><span class="nav-icon">⇄</span><span>Referrals</span><span class="nav-badge green" id="ref-badge">4</span></a>
        <a href="/modules/tasks.html" class="nav-item" data-page="tasks"><span class="nav-icon">☰</span><span>Tasks</span><span class="nav-badge" id="task-badge">3</span></a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Analytics</div>
        <a href="/modules/reports.html" class="nav-item" data-page="reports"><span class="nav-icon">▤</span><span>Reports</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">v1.0 · Auto-saving</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">Clinic Map</div>
      <div class="topbar-actions">
        <div class="status-pill"><span class="status-dot"></span><span id="status-text">Live</span></div>
        <button class="btn btn-primary btn-sm" onclick="addClinic()">+ Add Clinic</button>
      </div>
    </header>
    <div class="content" style="padding:0;">
      <div class="map-grid" style="height:calc(100vh - 56px);padding:20px;">
        <div class="map-sidebar" id="clinic-list"></div>
        <div class="map-main" id="map-view">
          <div class="map-placeholder">
            <div class="big-icon">◎</div>
            <div style="font-size:15px;font-weight:600;color:#475569;margin-bottom:4px;">Map Integration</div>
            <div style="font-size:12px;color:#94a3b8;max-width:300px;">
              Connect Google Maps or Mapbox API to show clinic locations.<br>
              Each card on the left has lat/lng data ready.
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
let clinics = [], selectedClinic = null;

async function init() {
  const s = await loadState();
  if (!s.success) return;
  clinics = s.data.clinics;
  renderList();
  document.getElementById('map-badge').textContent = clinics.length;
}

function renderList() {
  const list = document.getElementById('clinic-list');
  list.innerHTML = clinics.map(c => `
    <div class="map-card ${selectedClinic === c.id ? 'active' : ''}" onclick="selectClinic('${c.id}')">
      <div class="map-card-name">${esc(c.name)}</div>
      <div class="map-card-city">${esc(c.city)}</div>
      <div class="map-card-badges">
        <span class="badge badge-${c.status==='operational'?'green':c.status==='startup'?'blue':'amber'}">${c.status}</span>
        <span class="badge badge-${c.type==='independent'?'purple':'gray'}">${c.type}</span>
      </div>
    </div>
  `).join('') + `
    <div class="map-card" onclick="addClinic()" style="border-style:dashed;text-align:center;color:#94a3b8;">
      <div style="font-size:18px;">+</div>
      <div style="font-size:12px;">Add Clinic</div>
    </div>
  `;
}

function selectClinic(id) {
  selectedClinic = id;
  renderList();
  const c = clinics.find(x => x.id === id);
  const mapView = document.getElementById('map-view');
  mapView.innerHTML = `
    <div style="padding:24px;width:100%;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div>
          <div style="font-size:18px;font-weight:700;color:#0f172a;">${esc(c.name)}</div>
          <div style="font-size:13px;color:#64748b;margin-top:2px;">${esc(c.city)} · Lat: ${c.lat || '—'} · Lng: ${c.lng || '—'}</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="editClinic('${c.id}')">✎ Edit</button>
          <button class="btn btn-secondary btn-sm" onclick="showPlaceholder()">Back to List</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
        <div class="clinic-detail-panel">
          <div style="font-size:11px;color:#94a3b8;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;">Status</div>
          <div style="font-size:14px;font-weight:600;color:#1e293b;margin-top:4px;">${esc(c.status)}</div>
        </div>
        <div class="clinic-detail-panel">
          <div style="font-size:11px;color:#94a3b8;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;">Type</div>
          <div style="font-size:14px;font-weight:600;color:#1e293b;margin-top:4px;">${esc(c.type)}</div>
        </div>
        <div class="clinic-detail-panel">
          <div style="font-size:11px;color:#94a3b8;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;">Monthly Revenue</div>
          <div style="font-size:14px;font-weight:600;color:#1e293b;margin-top:4px;">$${(c.revenue||0).toLocaleString()}</div>
        </div>
      </div>
      <div class="clinic-detail-panel">
        <div style="font-size:11px;color:#94a3b8;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;">Notes</div>
        <div style="font-size:13px;color:#334155;line-height:1.5;">${esc(c.notes)}</div>
      </div>
      <div class="clinic-detail-panel">
        <div style="font-size:11px;color:#94a3b8;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;">Responsible</div>
        <div style="font-size:13px;color:#334155;">${esc(c.assignedTo)}</div>
      </div>
    </div>
  `;
}

function showPlaceholder() {
  selectedClinic = null;
  renderList();
  document.getElementById('map-view').innerHTML = `
    <div class="map-placeholder">
      <div class="big-icon">◎</div>
      <div style="font-size:15px;font-weight:600;color:#475569;margin-bottom:4px;">Map Integration</div>
      <div style="font-size:12px;color:#94a3b8;max-width:300px;">
        Connect Google Maps or Mapbox API to show clinic locations.<br>
        Each card on the left has lat/lng data ready.
      </div>
    </div>
  `;
}

function addClinic() {
  const id = 'c' + Date.now();
  clinics.push({ id, name: 'New Clinic', city: '', lat: null, lng: null, status: 'prospective', type: 'independent', notes: '', assignedTo: 'greene', revenue: 0, expenses: 0, patientsMonth: 0 });
  selectedClinic = id;
  renderList(); selectClinic(id);
  saveState({ nodes: {}, clinics, referrals: [], tasks: [], alerts: [] });
}

async function editClinic(id) {
  const c = clinics.find(x => x.id === id);
  if (!c) return;
  const name = prompt('Clinic name:', c.name);
  if (name === null) return;
  c.name = name || c.name;
  c.city = prompt('City:', c.city) || c.city;
  const rev = prompt('Monthly revenue:', c.revenue);
  if (rev !== null) c.revenue = parseInt(rev) || 0;
  c.notes = prompt('Notes:', c.notes) || c.notes;
  selectClinic(id);
  await saveState({ nodes: {}, clinics, referrals: [], tasks: [], alerts: [] });
}

init();
</script>
</body>
</html>
