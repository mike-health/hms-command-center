<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Map — HMS Command</title>
<link rel="stylesheet" href="/css/app.css?v=3">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
.map-wrap { display: grid; grid-template-columns: 300px 1fr; gap: 0; height: calc(100vh - 56px); }
.map-sidebar { background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; }
.map-sidebar-header { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
.map-sidebar-header h3 { font-size: 14px; font-weight: 600; color: #1e293b; }
.map-list { flex: 1; overflow-y: auto; padding: 8px; }
.map-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
.map-card:hover { border-color: #bfdbfe; background: #f8fafc; }
.map-card.active { border-color: #2563eb; background: #eff6ff; }
.map-card-name { font-size: 13px; font-weight: 600; color: #1e293b; }
.map-card-city { font-size: 11px; color: #64748b; margin-top: 2px; }
.map-card-badges { display: flex; gap: 4px; margin-top: 6px; }
#map-container { width: 100%; height: 100%; background: #f0f4f8; }
.map-popup h4 { margin: 0 0 4px; font-size: 14px; color: #1e293b; }
.map-popup p { margin: 0; font-size: 12px; color: #64748b; }
.map-popup .badge-row { display: flex; gap: 4px; margin-top: 6px; }
.add-clinic-card { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 14px; text-align: center; cursor: pointer; color: #64748b; font-size: 12px; font-weight: 500; transition: all 0.15s; }
.add-clinic-card:hover { border-color: #93c5fd; color: #2563eb; background: #f8fafc; }
@media (max-width: 768px) { .map-wrap { grid-template-columns: 1fr; grid-template-rows: 200px 1fr; } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><h1>HMS Command</h1><div class="sub">Hyperbaric Management</div></div>
    <nav class="nav">
      <div class="nav-section"><div class="nav-section-title">Overview</div>
        <a href="/" class="nav-item" data-page="dashboard"><span class="nav-icon">◈</span><span>Dashboard</span></a>
      </div>
      <div class="nav-section"><div class="nav-section-title">Operations</div>
        <a href="/modules/org-chart.html" class="nav-item" data-page="org-chart"><span class="nav-icon">⚙</span><span>Org Chart</span></a>
        <a href="/modules/map.html" class="nav-item active" data-page="map"><span class="nav-icon">◎</span><span>Clinic Map</span><span class="nav-badge blue" id="map-badge">6</span></a>
        <a href="/modules/referrals.html" class="nav-item" data-page="referrals"><span class="nav-icon">⇄</span><span>Referrals</span><span class="nav-badge green" id="ref-badge">4</span></a>
        <a href="/modules/tasks.html" class="nav-item" data-page="tasks"><span class="nav-icon">☰</span><span>Tasks</span><span class="nav-badge" id="task-badge">3</span></a>
      </div>
      <div class="nav-section"><div class="nav-section-title">Analytics</div>
        <a href="/modules/reports.html" class="nav-item" data-page="reports"><span class="nav-icon">▤</span><span>Reports</span></a>
      </div>
    </nav>
    <div class="sidebar-footer">v1.0 · Auto-saving</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">Clinic Map</div>
      <div class="topbar-actions">
        <div class="status-pill"><span class="status-dot"></span><span id="status-text">Live</span></div>
        <button class="btn btn-primary btn-sm" onclick="addClinic()">+ Add Clinic</button>
      </div>
    </header>
    <div class="content" style="padding:0;">
      <div class="map-wrap">
        <div class="map-sidebar">
          <div class="map-sidebar-header">
            <h3>Clinics</h3>
            <span class="clinic-count" id="clinic-count" style="font-size:12px;color:#94a3b8;">0</span>
          </div>
          <div class="map-list" id="clinic-list">
            <div class="loading" style="padding:20px;text-align:center;color:#94a3b8;">Loading clinics...</div>
          </div>
        </div>
        <div id="map-container"></div>
      </div>
    </div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/js/app.js?v=3"></script>
<script>
let clinics = [], map = null, markers = [];

async function init() {
  try {
    const s = await loadState();
    if (!s.success) throw new Error('Failed to load');
    clinics = s.data.clinics || [];
    document.getElementById('map-badge').textContent = clinics.length;
    document.getElementById('clinic-count').textContent = clinics.length;
    renderList();
    initMap();
  } catch (e) {
    console.error('Map init error:', e);
    document.getElementById('clinic-list').innerHTML = `
      <div style="padding:20px;text-align:center;color:#dc2626;">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;">Failed to load clinics</div>
        <div style="font-size:11px;color:#94a3b8;margin-bottom:12px;">${esc(e.message)}</div>
        <button class="btn btn-primary btn-sm" onclick="init()">Retry</button>
      </div>`;
  }
}

function renderList() {
  const list = document.getElementById('clinic-list');
  if (!clinics.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;">No clinics</div>';
    return;
  }
  list.innerHTML = clinics.map(c => `
    <div class="map-card" data-id="${esc(c.id)}" onclick="focusClinic('${esc(c.id)}')">
      <div class="map-card-name">${esc(c.name)}</div>
      <div class="map-card-city">${esc(c.city)}</div>
      <div class="map-card-badges">
        <span class="badge badge-${c.status==='operational'?'green':c.status==='startup'?'blue':'amber'}">${esc(c.status)}</span>
        <span class="badge badge-${c.type==='independent'?'purple':'gray'}">${esc(c.type)}</span>
      </div>
    </div>
  `).join('') + `
    <div class="add-clinic-card" onclick="addClinic()">
      <div style="font-size:18px;">+</div>
      <div>Add Clinic</div>
    </div>
  `;
}

function initMap() {
  map = L.map('map-container').setView([39.8283, -98.5795], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  const colors = { operational:'#22c55e', partly:'#f59e0b', startup:'#3b82f6', prospective:'#94a3b8' };
  const valid = clinics.filter(c => c.lat != null && c.lng != null);

  valid.forEach(c => {
    const marker = L.circleMarker([c.lat, c.lng], {
      radius: 10, fillColor: colors[c.status] || '#94a3b8', color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.85
    }).addTo(map);
    marker.bindPopup(`<div class="map-popup"><h4>${esc(c.name)}</h4><p>${esc(c.city)}</p><div class="badge-row"><span class="badge badge-${c.status==='operational'?'green':c.status==='startup'?'blue':'amber'}">${esc(c.status)}</span><span class="badge badge-${c.type==='independent'?'purple':'gray'}">${esc(c.type)}</span></div></div>`);
    marker.on('click', () => highlightCard(c.id));
    markers.push({ id: c.id, marker });
  });

  if (valid.length > 0) {
    const group = new L.featureGroup(markers.map(m => m.marker));
    map.fitBounds(group.getBounds().pad(0.2));
  }
}

function focusClinic(id) {
  highlightCard(id);
  const c = clinics.find(x => x.id === id);
  const m = markers.find(x => x.id === id);
  if (m && c && c.lat != null && c.lng != null) {
    map.setView([c.lat, c.lng], 12);
    m.marker.openPopup();
  }
}

function highlightCard(id) {
  document.querySelectorAll('.map-card').forEach(card => {
    card.classList.toggle('active', card.dataset.id === id);
  });
}

function addClinic() {
  const name = prompt('Clinic name:'); if (!name) return;
  const city = prompt('City (e.g., Austin, TX):') || '';
  const lat = parseFloat(prompt('Latitude:')); const lng = parseFloat(prompt('Longitude:'));
  alert('Clinic "' + esc(name) + '" added. (Server save coming in next update)');
}

init();
</script>
</body>
</html>
